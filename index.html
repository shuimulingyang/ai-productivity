<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 提效实践库 · AI Productivity Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #424245;
      --text-muted: #6e6e73;
      --text-micro: #86868b;
      --border: rgba(0,0,0,0.08);
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
      --radius: 18px;
      --radius-sm: 10px;
      --radius-pill: 999px;

      /* dept colors */
      --finance-bg: #e8f4fd; --finance-text: #0071e3;
      --legal-bg: #f0eeff; --legal-text: #6e40c9;
      --hr-bg: #fce7f3; --hr-text: #be185d;
      --cs-bg: #fff3e8; --cs-text: #c2410c;
      --mkt-bg: #fef9e7; --mkt-text: #a16207;
      --ops-bg: #e6faf5; --ops-text: #0d7a5f;

      /* HR sub-dept colors */
      --perf-bg: #eff6ff; --perf-text: #1d4ed8;
      --ld-bg: #ecfdf5; --ld-text: #065f46;
      --comp-bg: #fffbeb; --comp-text: #92400e;
      --ee-bg: #f5f3ff; --ee-text: #6d28d9;
      --wp-bg: #f1f5f9; --wp-text: #475569;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HERO ── */
    .hero {
      background: #000;
      color: #fff;
      text-align: center;
      padding: 72px 24px 60px;
    }
    .hero-eyebrow {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 14px;
    }
    .hero h1 {
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero h1 span { color: #2997ff; }
    .hero p {
      font-size: 17px;
      color: rgba(255,255,255,0.65);
      max-width: 540px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }
    .hero-meta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.08);
      padding: 6px 14px;
      border-radius: var(--radius-pill);
    }
    .hero-meta span { width: 6px; height: 6px; border-radius: 50%; background: #30d158; display: inline-block; }

    /* ── STATS BAR ── */
    .stats-bar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .stats-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 0;
    }
    .stat {
      padding: 18px 28px 18px 0;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .stat + .stat { border-left: 1px solid var(--border); padding-left: 28px; }
    .stat-num {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .stat-label { font-size: 12px; color: var(--text-muted); }

    /* ── MAIN LAYOUT ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── FILTER BAR ── */
    .filter-section { margin-bottom: 32px; }
    .filter-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }

    .filter-btn {
      padding: 8px 18px;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text-secondary);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: #f0f6ff; }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 10px rgba(0,113,227,0.3);
    }

    /* Search */
    .search-wrap { position: relative; margin-top: 4px; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
    #searchInput {
      width: 100%;
      max-width: 340px;
      padding: 10px 16px 10px 40px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--card);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s;
      font-family: inherit;
    }
    #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.12); }
    #searchInput::placeholder { color: var(--text-muted); }

    /* ── GRID ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: box-shadow 0.22s ease, transform 0.22s ease;
      cursor: default;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    /* Card header */
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      letter-spacing: 0.01em;
    }
    .badge-source { background: #f5f5f7; color: var(--text-secondary); }

    .badge-dept { }
    .dept-finance  { background: var(--finance-bg); color: var(--finance-text); }
    .dept-legal    { background: var(--legal-bg);   color: var(--legal-text); }
    .dept-hr       { background: var(--hr-bg);      color: var(--hr-text); }
    .dept-cs       { background: var(--cs-bg);      color: var(--cs-text); }
    .dept-marketing{ background: var(--mkt-bg);     color: var(--mkt-text); }
    .dept-operations{ background: var(--ops-bg);    color: var(--ops-text); }

    /* HR sub-dept badges */
    .sub-performance  { background: var(--perf-bg); color: var(--perf-text); }
    .sub-l-and-d      { background: var(--ld-bg);   color: var(--ld-text); }
    .sub-compensation { background: var(--comp-bg); color: var(--comp-text); }
    .sub-employee-exp { background: var(--ee-bg);   color: var(--ee-text); }
    .sub-workforce-planning { background: var(--wp-bg); color: var(--wp-text); }

    /* HR sub-filter row */
    .sub-filter-row {
      display: none;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: -4px;
      margin-bottom: 12px;
      padding: 12px 16px;
      background: #fce7f3;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(190,24,93,0.12);
    }
    .sub-filter-row.visible { display: flex; }
    .sub-filter-label {
      font-size: 11px;
      font-weight: 600;
      color: #be185d;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      align-self: center;
      margin-right: 4px;
    }
    .filter-btn.sub {
      font-size: 12.5px;
      padding: 6px 14px;
      border-color: rgba(190,24,93,0.2);
      color: #be185d;
      background: #fff;
    }
    .filter-btn.sub:hover { background: #fce7f3; border-color: #be185d; color: #9d174d; }
    .filter-btn.sub.active { background: #be185d; border-color: #be185d; color: #fff; box-shadow: 0 2px 10px rgba(190,24,93,0.3); }

    .card-date { font-size: 12px; color: var(--text-micro); white-space: nowrap; padding-top: 2px; }

    /* Title */
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      letter-spacing: -0.01em;
    }
    .card-title a {
      color: inherit;
      text-decoration: none;
    }
    .card-title a:hover { color: var(--accent); }

    /* Summary */
    .card-summary {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Divider */
    .card-divider { height: 1px; background: var(--border); }

    /* Key Insights */
    .insights-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-micro);
      margin-bottom: 10px;
    }
    .insights-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .insight { display: flex; gap: 10px; }
    .ins-dot {
      color: var(--accent);
      font-size: 16px;
      line-height: 1.3;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .ins-body { display: flex; flex-direction: column; gap: 2px; }
    .ins-zh { font-size: 13px; line-height: 1.55; color: var(--text-secondary); }
    .ins-en { font-size: 11.5px; line-height: 1.45; color: var(--text-micro); font-style: italic; }

    /* Card footer */
    .card-footer { margin-top: auto; padding-top: 4px; }
    .read-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      transition: gap 0.15s;
    }
    .read-link:hover { gap: 7px; }
    .read-link svg { transition: transform 0.15s; }
    .read-link:hover svg { transform: translateX(2px); }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 72px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
    .empty p { font-size: 14px; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 12px;
      color: var(--text-micro);
      border-top: 1px solid var(--border);
      background: #fff;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      .hero { padding: 52px 20px 44px; }
      .stats-inner { flex-wrap: wrap; }
      .stat { padding: 14px 16px; }
      .stat + .stat { border-left: none; border-top: 1px solid var(--border); }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <div class="hero-eyebrow">OKG · AI Transformation Intelligence</div>
  <h1>AI 提效实践库<br><span>AI Productivity Hub</span></h1>
  <p>追踪全球企业非产研部门 AI 落地实践与提效案例<br>财务 · 法务 · HR · 客服 · 市场 · 运营</p>
  <div class="hero-meta">
    <span></span>
    更新于 <span id="lastUpdated">—</span> &nbsp;·&nbsp; 持续追踪中
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat"><span class="stat-num" id="s-total">—</span><span class="stat-label">篇案例</span></div>
    <div class="stat"><span class="stat-num" id="s-dept">6</span><span class="stat-label">个部门</span></div>
    <div class="stat"><span class="stat-num" id="s-finance">—</span><span class="stat-label">💰 财务</span></div>
    <div class="stat"><span class="stat-num" id="s-hr">—</span><span class="stat-label">👥 HR</span></div>
    <div class="stat"><span class="stat-num" id="s-cs">—</span><span class="stat-label">🎧 客服</span></div>
    <div class="stat"><span class="stat-num" id="s-ops">—</span><span class="stat-label">⚙️ 运营</span></div>
  </div>
</div>

<!-- MAIN -->
<main class="main">

  <!-- FILTERS -->
  <div class="filter-section">
    <div class="filter-label">部门筛选 Department</div>
    <div class="filter-row" id="deptFilters">
      <button class="filter-btn active" data-dept="all">全部 All</button>
      <button class="filter-btn" data-dept="finance">💰 财务</button>
      <button class="filter-btn" data-dept="legal">⚖️ 法务/合规</button>
      <button class="filter-btn" data-dept="hr">👥 HR</button>
      <button class="filter-btn" data-dept="customer-service">🎧 客服</button>
      <button class="filter-btn" data-dept="marketing">📣 市场</button>
      <button class="filter-btn" data-dept="operations">⚙️ 运营</button>
    </div>

    <!-- HR sub-filters (visible when HR is selected) -->
    <div class="sub-filter-row" id="hrSubFilters">
      <span class="sub-filter-label">HR 细分</span>
      <button class="filter-btn sub active" data-sub="all">全部</button>
      <button class="filter-btn sub" data-sub="performance">📊 绩效管理</button>
      <button class="filter-btn sub" data-sub="l-and-d">🎓 学习发展</button>
      <button class="filter-btn sub" data-sub="compensation">💵 薪酬激励</button>
      <button class="filter-btn sub" data-sub="employee-exp">✨ 员工体验</button>
      <button class="filter-btn sub" data-sub="workforce-planning">📈 人力规划</button>
    </div>

    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="搜索关键词...">
    </div>
  </div>

  <!-- CARDS GRID -->
  <div class="grid" id="cardsGrid"></div>

</main>

<!-- FOOTER -->
<footer>
  <p>AI 提效实践库 · <a href="https://shuimulingyang.github.io/ai-org-insights" target="_blank">AI 组织洞察</a> &nbsp;|&nbsp; Kyle Pan · OKG HR OD &nbsp;|&nbsp; 内容由 AI 辅助整理，仅供内部研究参考</p>
</footer>

<script src="data.js?v=20260422b"></script>
<script>
  const DEPT_META = {
    finance:           { label: "💰 财务",      cls: "dept-finance" },
    legal:             { label: "⚖️ 法务/合规",  cls: "dept-legal" },
    hr:                { label: "👥 HR",        cls: "dept-hr" },
    "customer-service":{ label: "🎧 客服",       cls: "dept-cs" },
    marketing:         { label: "📣 市场",       cls: "dept-marketing" },
    operations:        { label: "⚙️ 运营",       cls: "dept-operations" },
  };
  const SUB_META = {
    "performance":       { label: "📊 绩效管理", cls: "sub-performance" },
    "l-and-d":           { label: "🎓 学习发展", cls: "sub-l-and-d" },
    "compensation":      { label: "💵 薪酬激励", cls: "sub-compensation" },
    "employee-exp":      { label: "✨ 员工体验", cls: "sub-employee-exp" },
    "workforce-planning":{ label: "📈 人力规划", cls: "sub-workforce-planning" },
  };

  let activeDept = "all";
  let activeSub  = "all";
  let searchQuery = "";

  function init() {
    const data = PRODUCTIVITY_DATA;
    document.getElementById("lastUpdated").textContent = data.last_updated;
    document.getElementById("s-total").textContent = data.articles.length;
    document.getElementById("s-finance").textContent = data.articles.filter(a => a.dept === "finance").length;
    document.getElementById("s-hr").textContent = data.articles.filter(a => a.dept === "hr").length;
    document.getElementById("s-cs").textContent = data.articles.filter(a => a.dept === "customer-service").length;
    document.getElementById("s-ops").textContent = data.articles.filter(a => a.dept === "operations").length;
    render();
  }

  function render() {
    const articles = PRODUCTIVITY_DATA.articles.filter(a => {
      const deptOk = activeDept === "all" || a.dept === activeDept;
      if (!deptOk) return false;
      const subOk = activeSub === "all" || a.sub_dept === activeSub;
      if (!subOk) return false;
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return (a.title + a.source + a.summary + (a.key_insights || []).map(i => i.zh + i.en).join(" ")).toLowerCase().includes(q);
    });

    const grid = document.getElementById("cardsGrid");
    if (!articles.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>暂无匹配内容</h3><p>请尝试其他关键词或筛选条件</p></div>`;
      return;
    }

    grid.innerHTML = articles.map(a => {
      const dept = DEPT_META[a.dept] || { label: a.dept, cls: "" };
      const sub  = a.sub_dept ? SUB_META[a.sub_dept] : null;
      const subBadge = sub ? `<span class="badge badge-dept ${sub.cls}">${sub.label}</span>` : "";

      const insights = (a.key_insights || []).map(ins =>
        `<li class="insight">
          <span class="ins-dot">›</span>
          <span class="ins-body">
            <span class="ins-zh">${ins.zh}</span>
            <span class="ins-en">${ins.en}</span>
          </span>
        </li>`
      ).join("");

      return `
      <article class="card">
        <div class="card-header">
          <div class="card-badges">
            <span class="badge badge-source">${a.source}</span>
            <span class="badge badge-dept ${dept.cls}">${dept.label}</span>
            ${subBadge}
          </div>
          <span class="card-date">${a.date}</span>
        </div>

        <h2 class="card-title">
          <a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
        </h2>

        <p class="card-summary">${a.summary}</p>

        <div class="card-divider"></div>

        <div>
          <div class="insights-label">核心数据 Key Insights</div>
          <ul class="insights-list">${insights}</ul>
        </div>

        <div class="card-footer">
          <a class="read-link" href="${a.url}" target="_blank" rel="noopener">
            阅读原文
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>
      </article>`;
    }).join("");
  }

  // Dept filter
  document.getElementById("deptFilters").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn[data-dept]");
    if (!btn) return;
    document.querySelectorAll(".filter-btn[data-dept]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeDept = btn.dataset.dept;
    activeSub = "all";
    // toggle HR sub-filters
    const subRow = document.getElementById("hrSubFilters");
    if (activeDept === "hr") {
      subRow.classList.add("visible");
    } else {
      subRow.classList.remove("visible");
    }
    document.querySelectorAll(".filter-btn.sub").forEach(b => b.classList.remove("active"));
    document.querySelector(".filter-btn.sub[data-sub='all']").classList.add("active");
    render();
  });

  // HR sub-filter
  document.getElementById("hrSubFilters").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn.sub");
    if (!btn) return;
    document.querySelectorAll(".filter-btn.sub").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeSub = btn.dataset.sub;
    render();
  });

  // Search
  document.getElementById("searchInput").addEventListener("input", e => {
    searchQuery = e.target.value.trim();
    render();
  });

  init();
</script>
</body>
</html>
